steps:
  - uses: actions/checkout@v4

  - uses: google-labs-code/jules-invoke@v1
    with:
      prompt: |
        The following GitHub issue was created or updated.
        Read the issue and take appropriate action as orchestrator agent
        per repos AGENTS.md protocol.

        Issue content:
        ${{ github.event.issue.title }}
        ${{ github.event.issue.body }}
      jules_api_key: ${{ secrets.JULES_API_KEY }}
